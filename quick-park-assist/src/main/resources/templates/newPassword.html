<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: #fff;
        }
        .reset-password-container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            padding: 30px;
            color: #333;
        }
        .reset-password-container h2 {
            color: #007bff;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .btn-custom {
            background-color: #007bff;
            color: white;
            border-radius: 20px;
        }
        .btn-custom:hover {
            background-color: #0056b3;
        }
        .form-control {
            border-radius: 20px;
            border: 1px solid #ced4da;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #007bff;
        }
        hr {
            margin: 20px 0;
        }
        .text-primary {
            font-weight: bold;
        }
        .icon {
            font-size: 2.5rem;
            color: #007bff;
            margin-bottom: 15px;
        }
        .forgot-password-container p {
            font-size: 0.9rem;
        }
    </style>
</head>

<body th:style="'background: linear-gradient(rgb(0 0 0 / 20%), rgb(0 0 0 / 56%)),
                        url('+ @{/images/forgotPasswordImage.jpg }+') no-repeat center center/cover'">
    <div>
        <div class="card-body">
            <div class="reset-password-container text-center">
                <h2>Reset Password</h2>
                <form th:action="@{/auth/reset-password}" method="post">
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <input type="hidden" name="email" th:value="${email}">

                    <div class="form-group mb-3">
                        <input
                                type="password"
                                class="form-control"
                                id="newPassword"
                                name="newPassword"
                                placeholder="Enter your new password"
                                required
                        />
                    </div>
                    <button type="submit" class="btn btn-custom btn-block text-light">
                        <i class="fas fa-lock"></i> Reset Password
                    </button>
                </form>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
